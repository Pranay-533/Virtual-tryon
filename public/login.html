<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — FitMirror</title>
<link rel="stylesheet" href="/css/style.css"/>
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }
.auth-wrap {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}
.auth-left {
  background: var(--dark);
  display: flex; align-items: center; justify-content: center;
  padding: 60px;
  position: relative;
  overflow: hidden;
}
.auth-left::before {
  content: '';
  position: absolute;
  width: 400px; height: 400px;
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.auth-left::after {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  border: 1px solid rgba(201,169,110,0.08);
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.auth-left-content {
  position: relative; z-index: 1;
  text-align: center;
  color: var(--cream);
}
.auth-left-logo {
  font-family: var(--font-serif);
  font-size: 2.5rem;
  font-weight: 300;
  margin-bottom: 16px;
  color: var(--cream);
}
.auth-left-logo span { color: var(--gold); }
.auth-left-tagline {
  font-size: 0.85rem;
  color: rgba(250,247,242,0.5);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 48px;
}
.auth-demo {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,169,110,0.2);
  border-radius: 6px;
  padding: 24px;
  text-align: left;
}
.auth-demo h4 {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 16px;
  letter-spacing: 0.05em;
}
.demo-item {
  margin-bottom: 12px;
  font-size: 0.78rem;
  color: rgba(250,247,242,0.7);
  line-height: 1.6;
}
.demo-item strong { color: var(--gold-light); display: block; }

.auth-right {
  display: flex; align-items: center; justify-content: center;
  padding: 60px;
  background: var(--cream);
}
.auth-form-wrap {
  width: 100%;
  max-width: 400px;
  animation: fadeUp 0.5s ease;
}
.auth-title {
  font-family: var(--font-serif);
  font-size: 2.2rem;
  font-weight: 300;
  color: var(--dark);
  margin-bottom: 6px;
}
.auth-sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 36px;
}
.auth-sub a { color: var(--gold); text-decoration: none; }

.role-selector {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}
.role-btn {
  padding: 10px 6px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--font-sans);
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.role-btn:hover { border-color: var(--gold); color: var(--dark); }
.role-btn.active { background: var(--dark); color: var(--cream); border-color: var(--dark); }

.forgot-link {
  font-size: 0.78rem;
  color: var(--muted);
  text-decoration: none;
  float: right;
  margin-top: -14px;
  margin-bottom: 20px;
}
.forgot-link:hover { color: var(--gold); }

@media (max-width: 768px) {
  .auth-wrap { grid-template-columns: 1fr; }
  .auth-left { display: none; }
  .auth-right { padding: 80px 24px 40px; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">Fit<span>Mirror</span></a>
  <div class="nav-links">
    <a href="/register">Create account</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-left">
    <div class="auth-left-content">
      <div class="auth-left-logo">Fit<span>Mirror</span></div>
      <p class="auth-left-tagline">Virtual Try-On Platform</p>
      <div class="auth-demo">
        <h4>Demo Credentials</h4>
        <div class="demo-item">
          <strong>Admin</strong>
          admin@tryon.com · admin123
        </div>
        <div class="demo-item">
          <strong>Retailer</strong>
          retailer@tryon.com · retailer123
        </div>
        <div class="demo-item">
          <strong>Consumer</strong>
          consumer@tryon.com · consumer123
        </div>
      </div>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-form-wrap">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Don't have an account? <a href="/register">Register here</a></p>

      <div id="alert" class="alert"></div>

      <div class="form-group">
        <label>Email address <span class="required-star">*</span></label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password <span class="required-star">*</span></label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
        Sign In
      </button>

      <div class="divider">or</div>

      <a href="/register" class="btn btn-outline btn-full">Create New Account</a>
    </div>
  </div>
</div>

<script>
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const alert = document.getElementById('alert');

  alert.className = 'alert'; alert.textContent = '';

  if (!email || !password) {
    alert.className = 'alert alert-error show';
    alert.textContent = 'Please enter your email and password.';
    return;
  }

  btn.innerHTML = '<span class="loader"></span> Signing in...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      alert.className = 'alert alert-error show';
      alert.textContent = data.error || 'Login failed.';
      btn.innerHTML = 'Sign In'; btn.disabled = false;
      return;
    }

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));

    alert.className = 'alert alert-success show';
    alert.textContent = 'Login successful! Redirecting...';

    setTimeout(() => {
      if (data.user.role === 'admin') location.href = '/admin';
      else location.href = '/dashboard';
    }, 800);
  } catch {
    alert.className = 'alert alert-error show';
    alert.textContent = 'Server error. Please try again.';
    btn.innerHTML = 'Sign In'; btn.disabled = false;
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Redirect if already logged in
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (token && user) {
  location.href = user.role === 'admin' ? '/admin' : '/dashboard';
}
</script>
</body>
</html>
